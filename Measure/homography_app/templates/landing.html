<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageMeasure</title>
  <style>
    :root {
      --bg-1: #f8efe2;
      --bg-2: #d7efe4;
      --bg-3: #f6cfb8;
      --ink: #1e2a2f;
      --card: #ffffff;
      --accent: #0f766e;
      --accent-2: #0a5a54;
      --shadow: rgba(15, 118, 110, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, var(--bg-3), transparent 35%),
        radial-gradient(circle at 80% 85%, #c6e5ff, transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .wrap {
      width: min(92vw, 560px);
      text-align: center;
      padding: 40px 28px;
      background: color-mix(in srgb, var(--card) 85%, transparent);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 22px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(6px);
      animation: fadeInUp 500ms ease-out both;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    p {
      margin: 0 0 26px;
      font-size: clamp(1rem, 2vw, 1.1rem);
      opacity: 0.9;
    }

    .admin-btn {
      display: inline-block;
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(120deg, var(--accent), #14998f);
      box-shadow: 0 12px 28px var(--shadow);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .admin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px var(--shadow);
      background: linear-gradient(120deg, var(--accent-2), var(--accent));
    }

    .admin-btn:active {
      transform: translateY(0);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>ImageMeasure</h1>
    <p>Management entry point for the homography app.</p>
    <a class="admin-btn" href="/admin/">Open Admin Panel</a>
  </main>
</body>
</html>
